
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskGuard</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Header ───────────────────────────────────────────── -->
  <header class="header">
    <div class="logo">
      <img src="../icons/icon48.png" alt="TaskGuard" class="logo-icon" />
      <span class="logo-text">TaskGuard</span>
    </div>
    <span class="version">v1.0</span>
  </header>

  <div class="divider"></div>

  <!-- ── Status card ──────────────────────────────────────── -->
  <div class="status-card" id="statusCard">
    <div class="status-indicator">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Ready</span>
    </div>
    <p class="status-sub" id="statusSub">
      Go to the dashboard to start a session.
    </p>
  </div>

  <div class="divider"></div>

  <!-- ── Footer ───────────────────────────────────────────── -->
  <a class="dashboard-link" href="http://localhost:3000/session" target="_blank">
    Open dashboard →
  </a>

  <script src="popup.js"></script>
</body>
</html>
